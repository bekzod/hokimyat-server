<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>PDF Processor</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div class="container">
            <div class="column upload-section">
                <h2>Upload PDF</h2>
                <div class="upload-box" id="dropZone">
                    <input type="file" id="fileInput" accept=".pdf" hidden />
                    <div class="upload-content">
                        <img
                            src="upload-icon.svg"
                            alt="Upload"
                            class="upload-icon"
                        />
                        <p>Drag & Drop PDF here or</p>
                        <button id="selectFileBtn">Select File</button>
                    </div>
                </div>
                <div class="options">
                    <div class="task-selector">
                        <h3>AI Extraction Tasks</h3>
                        <p class="task-description">
                            Select which tasks to run (leave empty for default
                            tasks):
                        </p>
                        <div class="task-checkboxes">
                            <label class="task-option">
                                <input
                                    type="checkbox"
                                    value="summary"
                                    class="task-checkbox"
                                />
                                <span>Summary</span>
                            </label>
                            <label class="task-option">
                                <input
                                    type="checkbox"
                                    value="author_info"
                                    class="task-checkbox"
                                />
                                <span>Author Information</span>
                            </label>
                            <label class="task-option">
                                <input
                                    type="checkbox"
                                    value="department"
                                    class="task-checkbox"
                                />
                                <span>Department</span>
                            </label>
                            <label class="task-option">
                                <input
                                    type="checkbox"
                                    value="category"
                                    class="task-checkbox"
                                />
                                <span>Category</span>
                            </label>
                            <label class="task-option">
                                <input
                                    type="checkbox"
                                    value="entity_type"
                                    class="task-checkbox"
                                />
                                <span>Entity Type</span>
                            </label>
                            <label class="task-option">
                                <input
                                    type="checkbox"
                                    value="document_type"
                                    class="task-checkbox"
                                />
                                <span>Document Type</span>
                            </label>
                            <label class="task-option">
                                <input
                                    type="checkbox"
                                    value="origin"
                                    class="task-checkbox"
                                />
                                <span>Origin</span>
                            </label>
                            <label class="task-option">
                                <input
                                    type="checkbox"
                                    value="repeated_info"
                                    class="task-checkbox"
                                />
                                <span>Repeated Information</span>
                            </label>
                            <label class="task-option">
                                <input
                                    type="checkbox"
                                    value="case_info"
                                    class="task-checkbox"
                                />
                                <span>Case Information</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="column result-section">
                <h2>Results</h2>
                <pre id="resultJson"><code></code></pre>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
