server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static frontend files (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy meeting audio API (REST + WebSocket)
    location /api/meeting/ {
        proxy_pass http://audio_server:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        client_max_body_size 200M;
    }

    # Reverse proxy API requests to the backend
    location /api/ {
        proxy_pass http://ocr_server:${OCR_SERVER_PORT};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 50M;
    }

    # Proxy Swagger docs
    location /docs {
        proxy_pass http://ocr_server:${OCR_SERVER_PORT};
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://ocr_server:${OCR_SERVER_PORT};
        proxy_set_header Host $host;
    }
}
